<mat-toolbar color="primary" class="flex justify-between px-4 shadow">
  <!-- 🔷 Left: Logo -->
  <span class="font-semibold text-lg cursor-pointer" routerLink="/dashboard">
    💰 Finance App
  </span>

  <!-- 🧭 Desktop Menu -->
  <div class="hidden lg:flex items-center gap-6">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
      Dashboard
    </a>
    <a mat-button routerLink="transaction" routerLinkActive="active-link">
      Transactions
    </a>
    <a mat-button routerLink="" routerLinkActive="active-link">
      Insights
    </a>
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-3">

    <!-- Username (desktop only) -->
    <span class="hidden sm:block text-sm">
      {{ user() }}
    </span>

    <!-- Profile Menu -->
    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>{{ user() }}</span>
      </button>      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>

    </mat-menu>

    <!-- 🍔 Mobile Burger -->
    <div class="lg:hidden">
      <button mat-icon-button (click)="menuClick.emit()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

  </div>

</mat-toolbar>
