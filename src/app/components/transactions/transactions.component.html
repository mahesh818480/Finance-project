<div class="bg-white rounded-xl shadow p-3 sm:p-4">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <h2 class="text-base sm:text-lg font-semibold">Transactions</h2>
    <button mat-raised-button color="primary" (click)="openDialog()">
      + Add Transaction
    </button>
  </div>
  <!-- Filters -->
  <div class="flex flex-col sm:flex-row gap-3 mt-3">
    <mat-form-field appearance="outline" class="w-full sm:w-1/2 text-sm">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full sm:w-1/2 text-sm">
      <mat-label>Type</mat-label>
      <mat-select [(ngModel)]="filterType" (selectionChange)="filterByType()">
        <mat-option value="">All</mat-option>
        <mat-option value="income">Income</mat-option>
        <mat-option value="expense">Expense</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  <!-- TABLE -->
  <div class="overflow-x-auto mt-4">
    <table mat-table [dataSource]="dataSource" matSort
           class="w-full min-w-[600px] text-xs sm:text-sm">
      <!-- No -->
      <ng-container matColumnDef="No">
        <th mat-header-cell *matHeaderCellDef class="px-2 py-2">No.</th>
        <td mat-cell *matCellDef="let element; let i = index" class="px-2 py-2">
          {{ getIndex(i) }}
        </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="px-2 py-2">Date</th>
        <td mat-cell *matCellDef="let element" class="px-2 py-2 whitespace-nowrap">
          {{ element.date }}
        </td>
      </ng-container>

      <!-- Amount -->
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="px-2 py-2">Amount</th>
        <td mat-cell *matCellDef="let element" class="px-2 py-2 font-medium">
          ₹ {{ element.amount }}
        </td>
      </ng-container>

      <!-- Category -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef class="px-2 py-2">Category</th>
        <td mat-cell *matCellDef="let element" class="px-2 py-2">
          {{ element.category }}
        </td>
      </ng-container>

      <!-- Type -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef class="px-2 py-2">Type</th>
        <td mat-cell *matCellDef="let element"
            class="px-2 py-2 font-semibold"
            [ngClass]="{
              'text-green-600': element.type === 'income',
              'text-red-500': element.type === 'expense'
            }">
          {{ element.type }}
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="px-2 py-2">Actions</th>
        <td mat-cell *matCellDef="let element" class="px-2 py-2">

          <button mat-icon-button color="primary" (click)="openDialog(element)">
            <mat-icon class="text-sm">edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" (click)="delete(element.id)">
            <mat-icon class="text-sm">delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <!-- Rows -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"
          class="text-gray-600"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          class="hover:bg-gray-50 transition"></tr>

    </table>

  </div>

  <!-- Paginator -->
  <div class="mt-3">
    <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>
    </mat-paginator>
  </div>

</div>
