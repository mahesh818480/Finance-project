<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-gray-100 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">
      Create Account 📝
    </h2>
    <p class="text-center text-gray-500 mb-6">
      Start tracking your income & expenses
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Name -->
      <mat-form-field appearance="outline" class="w-full mb-4">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="form.controls['name'].invalid">
          Name required
        </mat-error>
      </mat-form-field>

      <!-- Email -->
      <mat-form-field appearance="outline" class="w-full mb-4">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
        <mat-error *ngIf="form.controls['email'].invalid">
          Valid email required
        </mat-error>
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="w-full mb-4">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password">
        <mat-error *ngIf="form.controls['password'].invalid">
          Minimum 6 characters
        </mat-error>
      </mat-form-field>

      <!-- Button -->
      <button mat-raised-button color="accent" class="w-full">
        Register
      </button>

    </form>

    <!-- Link -->
    <p class="text-center text-sm mt-4">
      Already have an account?
      <a routerLink="/" class="text-green-600 font-medium">
        Login
      </a>
    </p>

  </div>
</div>
